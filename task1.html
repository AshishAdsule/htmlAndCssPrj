<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gaming Era</title>
  <link rel="stylesheet" href="./assets/Css/Style.css"/>
</head>
<body>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>
      <span class="pink">Gaming Era</span><br>
      <span class="gradient">Are you ready?</span>
    </h1>
    <p>How pro you are?</p>
    <button class="btn">Get Started</button>
  </div>

  <div class="hero-image">
    <img src="./assets/images/gaming1.jpg" alt="Hero">
  </div>
</section>

<!-- FEATURES -->
<section class="features">
  <div class="card">
    <img src="./assets/images/gaming2.jpg" alt="">
    <div class="card-content">
      <h2>Experience Bliss</h2>
      <p>High Performance Gaming Zone</p>
      <button class="btn">Start your own Game</button>
    </div>
  </div>

  <div class="card highlight">
    <img src="./assets/images/gamin3.jpg" alt="">
    <div class="card-content">
      <h2>Are you dare to?</h2>
      <p>Knock Out!!!</p>
      <button class="btn">Get Started</button>
    </div>
  </div>
</section>

</body>
</html>
